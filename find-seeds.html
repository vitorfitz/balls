<!DOCTYPE html>
<html>

<head>
    <title>Find Dramatic Seeds</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
        }

        #output {
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h3>Dramatic Seed Finder</h3>
    <div>
        <label>Matches per matchup: <input type="number" id="matches" value="100"></label>
        <button id="start">Start</button>
    </div>
    <div id="output"></div>

    <script>
        document.getElementById('start').onclick = () => {
            const output = document.getElementById('output');
            const matches = +document.getElementById('matches').value;

            output.textContent = 'Running in worker...\n';

            const worker = new Worker('find-seeds-worker.js');
            worker.postMessage({ matches });
            worker.onmessage = (e) => {
                if (e.data.progress) {
                    output.textContent = 'Running in worker...\n' + e.data.progress;
                } else {
                    output.textContent = e.data.result;
                    worker.terminate();
                }
            };
        };
    </script>
</body>

</html>
