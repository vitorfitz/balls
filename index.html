<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Earclacks</title>
    <link rel="stylesheet" href="index.css">
</head>

<body class="">
    <div id="menu">
        <h1>Earclacks</h1>
        <div id="mode">
            <span class="selected">Duel</span>
            <div id="divider"></div>
            <span>FFA</span>
        </div>
        <div id="balls"></div>
        <button id="start" class="disabled">Fight!</button>
        <label id="dramatic-toggle"><input type="checkbox" id="dramatic-check"> Dramatic Mode</label>
    </div>
    <div id="battle" class="hidden">
        <div class="col" style="position: relative;">
            <div id="battle-ui">
                <div id="ball1-info" class="ball-info"></div>
                <div id="ball2-info" class="ball-info"></div>
            </div>
            <canvas id="canvas" width="406" height="406"></canvas>
            <button id="back">⏎ Back</button>
        </div>
        <div id="leaderboard"></div>
        <script src="seedrandom.js"></script>
        <script src="index.js"></script>
        <script src="ffa-config.js"></script>
        <script src="dramatic.js"></script>
        <script src="ui.js"></script>
    </div>
</body>

</html>
